<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>İletişim Formu - Güvenli Test Paneli</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #f8fafc; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .form-card { background: white; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-4">

    <div class="form-card w-full max-w-lg p-8">
        <div class="text-center mb-8">
            <h1 class="text-2xl font-bold text-gray-800">Bize Ulaşın</h1>
            <p class="text-gray-500 text-sm mt-2">Sorularınız için aşağıdaki formu doldurabilirsiniz.</p>
        </div>

        <form action="contact_handler.php" method="POST" class="space-y-5">
            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-1">Adınız Soyadınız</label>
                <input type="text" name="full_name" required placeholder="Örn: Ahmet Yılmaz" 
                       class="w-full px-4 py-3 border border-gray-200 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none transition">
            </div>

            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-1">E-posta Adresiniz</label>
                <input type="email" name="email_address" required placeholder="isim@sirket.com" 
                       class="w-full px-4 py-3 border border-gray-200 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none transition">
            </div>

            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-1">Konu</label>
                <select name="subject" class="w-full px-4 py-3 border border-gray-200 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none transition bg-white">
                    <option value="Destek">Teknik Destek</option>
                    <option value="Satis">Satış ve Pazarlama</option>
                    <option value="Diger">Diğer</option>
                </select>
            </div>

            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-1">Mesajınız</label>
                <textarea name="message_body" rows="4" required placeholder="Mesajınızı buraya yazın..." 
                          class="w-full px-4 py-3 border border-gray-200 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none transition"></textarea>
            </div>

            <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 rounded-lg transition-all transform active:scale-95 shadow-lg">
                MESAJI GÖNDER
            </button>
        </form>
        
        <div class="mt-6 text-center text-xs text-gray-400">
            &copy; 2026 Pentest Lab - Authorized Access Only
        </div>
    </div>

</body>
</html>
