<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>İletişim | Kapveroix Analiz</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f9fafb; }
        .form-shadow { box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05); }
        .input-focus:focus { border-color: #3b82f6; ring: 2px; ring-color: #3b82f6; outline: none; }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-6">

    <div class="max-w-[500px] w-full bg-white rounded-2xl p-8 form-shadow border border-gray-100">
        <div class="text-center mb-8">
            <h1 class="text-3xl font-bold text-gray-900">Bize Ulaşın</h1>
            <p class="text-gray-500 mt-2 text-sm leading-relaxed">Sorularınız için aşağıdaki formu doldurabilirsiniz. Uzman ekibimiz en kısa sürede dönüş yapacaktır.</p>
        </div>

        <!-- NOT: Action kısmına senin VDS IP'ni ve PHP dosyanın adını yazdım -->
        <form action="http://216.106.178.54:6060/contact_handler.php" method="POST" class="space-y-4">
            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-1">Adınız Soyadınız</label>
                <input type="text" name="full_name" required placeholder="Örn: Ahmet Yılmaz" 
                       class="w-full px-4 py-3 border border-gray-200 rounded-xl input-focus transition-all placeholder-gray-300">
            </div>

            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-1">E-posta Adresiniz</label>
                <input type="email" name="email_address" required placeholder="isim@sirket.com" 
                       class="w-full px-4 py-3 border border-gray-200 rounded-xl input-focus transition-all placeholder-gray-300">
            </div>

            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-1">Konu</label>
                <select name="subject" class="w-full px-4 py-3 border border-gray-200 rounded-xl input-focus transition-all bg-white cursor-pointer">
                    <option value="Teknik Destek">Teknik Destek</option>
                    <option value="Yatirim Analizi">Yatırım Analizi</option>
                    <option value="Diger">Diğer</option>
                </select>
            </div>

            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-1">Mesajınız</label>
                <textarea name="message_body" rows="4" required placeholder="Mesajınızı buraya yazın..." 
                          class="w-full px-4 py-3 border border-gray-200 rounded-xl input-focus transition-all placeholder-gray-300 resize-none"></textarea>
            </div>

            <button type="submit" class="w-full bg-[#2563eb] hover:bg-[#1d4ed8] text-white font-bold py-4 rounded-xl transition-all shadow-md active:scale-95">
                MESAJI GÖNDER
            </button>
        </form>

        <div class="mt-8 text-center">
            <p class="text-[10px] text-gray-400 uppercase tracking-widest font-bold">
                © 2026 Pentest Lab - Authorized Access Only
            </p>
        </div>
    </div>

</body>
</html>
